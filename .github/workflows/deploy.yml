name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: matzayonc/setup-anchor-from-anchor-lang@main
        with:
          anchor-version: '1.0.1'
          solana-cli-version: '3.1.14'
          node-version: '25.8.1'

      - name: Anchor build
        run: anchor build --ignore-keys

      - name: Install dependencies
        working-directory: app
        run: bun install

      - name: Build
        working-directory: app
        run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
